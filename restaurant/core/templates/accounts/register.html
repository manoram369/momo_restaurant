<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- alertyfy -->



    <!-- CSS -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css" />
    <!-- custom css -->
    <link rel="stylesheet" href="{% static 'css/register.css'%}">
    <!-- font awesome -->

    <style>
        .cross {
            position: absolute;
            top: 0px;
            right: 8px;

        }

        .cross:hover {

            scale: 1.3;
            color: orange;
        }
    </style>
</head>

<body>
    <div class="contaier">
        <div class="row my-4">
            <div class="col-6">
                <h2 class="alert alert-info text-center">wellcome register form</h2>
                <img src="{% static 'images/mobile.png' %}" alt="">
            </div>

            <div class="col-6">
                <!-- From Uiverse.io by ammarsaa -->
                <form class="form" method="post" action="{% url 'register' %}">
                    {% csrf_token %}
                    <a href="{% url 'index' %}">
                        <h3 class="cross"><i class="fa-solid fa-xmark"></i></h3>
                    </a>
                    <p class="title">Register </p>
                    <p class="message">Signup now and get full access to our app. </p>
                    <div class="flex">
                        <label>
                            <input class="input" type="text" name="firstname" placeholder="" required="">
                            <span>Firstname</span>
                        </label>

                        <label>
                            <input class="input" type="text" name="lastname" placeholder="" required="">
                            <span>Lastname</span>
                        </label>
                    </div>
                    <label>
                        <input class="input" type="text" name="username" placeholder="" required="">
                        <span>username</span>
                    </label>

                    <label>
                        <input class="input" type="email" name="email" placeholder="" required="">
                        <span>Email</span>
                    </label>

                    <label>
                        <input class="input" type="password" name="password" placeholder="" required="">
                        <span>Password</span>
                    </label>
                    <label>
                        <input class="input" type="password" name="password1" placeholder="" required="">
                        <span>Confirm password</span>
                    </label>
                    <button class="submit">sign Up</button>
                    <p class="signin">Already have an acount ? <a href="{% url 'log_in' %}">sign in</a> </p>
                </form>
            </div>
        </div>
    </div>

    <!-- bootsrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <!-- JavaScript -->
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>

    {% if messages %}
    {% for message in messages %}
    {% if message.tags == 'success' %}
    <script>
        alertify.set('notifier', 'position', 'top-right');
        alertify.success('{{message}}');
    </script>
    {% else %}
    <script>
        alertify.set('notifier', 'position', 'top-right');
        alertify.error('{{message}}');
    </script>
    {% endif %}

    {% endfor %}
    {% endif %}

</body>

</html>
